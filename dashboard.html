<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; margin: 0; padding: 0; }
html { background: #0b0f17; }
body {
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  background:
    radial-gradient(1200px 600px at 12% -10%, rgba(95, 161, 74, 0.10), transparent 60%),
    radial-gradient(1000px 600px at 95% 5%, rgba(232, 156, 31, 0.08), transparent 60%),
    radial-gradient(900px 600px at 80% 110%, rgba(79, 128, 176, 0.10), transparent 60%),
    #0b0f17;
  color: #e8ecf5;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
::selection { background: rgba(245, 185, 66, 0.35); color: #fff; }

/* Layout */
.app { min-height: 100vh; min-height: -webkit-fill-available; min-height: 100dvh; }
.container { max-width: 80rem; margin: 0 auto; padding: 1rem 1rem 6rem; }

/* Header */
.header { padding: 1rem 0 1.5rem; }
.brand-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
.brand-icon { width: 2.5rem; height: 2.5rem; display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; border: 1px solid rgba(245, 185, 66, 0.4); background: rgba(245, 185, 66, 0.10); font-size: 1.25rem; }
.brand-text h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.025em; line-height: 1.1; }
.brand-text .addr { font-size: 0.875rem; color: #94a3b8; margin-top: 0.125rem; }
.text-gradient {
  background: linear-gradient(110deg, #f5b942 0%, #e87f5a 35%, #7aa2c8 70%, #8ec07c 100%);
  background-size: 220% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: gradient-slide 8s linear infinite;
}
@keyframes gradient-slide { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

.subtitle { max-width: 48rem; font-size: 0.875rem; color: #cbd5e1; line-height: 1.5; margin-top: 0.75rem; }

/* Tabs */
.tabs { display: inline-flex; gap: 0.25rem; padding: 0.25rem; border-radius: 1rem; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); margin: 1.5rem 0; overflow-x: auto; max-width: 100%; }
.tab-btn { position: relative; padding: 0.5rem 0.875rem; font-size: 0.875rem; font-weight: 500; border: 0; background: transparent; color: #cbd5e1; cursor: pointer; border-radius: 0.75rem; transition: color 0.2s; white-space: nowrap; min-height: 44px; }
.tab-btn:hover { color: #fff; }
.tab-btn.active { color: #fff; }
.tab-btn.active::before { content: ''; position: absolute; inset: 0; border-radius: 0.75rem; background: linear-gradient(135deg, rgba(245, 185, 66, 0.30), rgba(232, 127, 90, 0.15), rgba(122, 162, 200, 0.30)); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); z-index: 0; }
.tab-btn span.relative { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: flex-start; line-height: 1.2; }
.tab-btn .sub { font-size: 0.625rem; font-weight: 400; color: #94a3b8; margin-top: 0.125rem; }

/* Cards */
.card { background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015)); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 1rem; padding: 1.25rem; backdrop-filter: blur(6px); margin-bottom: 1rem; }
.card-title { font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin-bottom: 0.5rem; }
.card-value { font-size: 1.875rem; font-weight: 600; color: #f5b942; }
.card-sub { font-size: 0.75rem; color: #94a3b8; margin-top: 0.25rem; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }

/* Tables */
.table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
.table th { text-align: left; font-weight: 500; color: #94a3b8; padding: 0.625rem 0.5rem; border-bottom: 1px solid rgba(255, 255, 255, 0.08); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
.table td { padding: 0.75rem 0.5rem; border-bottom: 1px solid rgba(255, 255, 255, 0.04); vertical-align: top; }
.table tr:last-child td { border-bottom: 0; }
.table tr:hover { background: rgba(255, 255, 255, 0.02); }

.item-name { font-weight: 500; color: #e8ecf5; }
.item-scope { font-size: 0.75rem; color: #94a3b8; margin-top: 0.125rem; }
.item-notes { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; font-style: italic; }

/* Status badges */
.badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 999px; font-size: 0.7rem; font-weight: 500; white-space: nowrap; }
.badge-not_started { background: rgba(148, 163, 184, 0.18); color: #cbd5e1; }
.badge-in_progress { background: rgba(245, 185, 66, 0.18); color: #f5b942; }
.badge-blocked { background: rgba(232, 127, 90, 0.18); color: #e87f5a; }
.badge-done { background: rgba(138, 192, 124, 0.18); color: #8ec07c; }

/* Cost cells */
.cost-cell { font-variant-numeric: tabular-nums; }
.cost-actual { color: #8ec07c; font-weight: 500; }
.cost-est { color: #cbd5e1; }
.cost-total { font-weight: 600; }

/* Todo cards */
.todo-card { background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015)); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 0.75rem; padding: 0.875rem; margin-bottom: 0.5rem; display: flex; align-items: flex-start; gap: 0.75rem; }
.todo-check { width: 1.5rem; height: 1.5rem; border: 1.5px solid rgba(255, 255, 255, 0.2); border-radius: 0.375rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.875rem; cursor: pointer; background: transparent; color: transparent; transition: all 0.15s; }
.todo-check.done { background: #8ec07c; border-color: #8ec07c; color: #0b0f17; }
.todo-body { flex: 1; min-width: 0; }
.todo-title { font-weight: 500; color: #e8ecf5; font-size: 0.9375rem; }
.todo-title.done { color: #64748b; text-decoration: line-through; }
.todo-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.375rem; font-size: 0.75rem; color: #94a3b8; }
.todo-meta .owner { color: #7aa2c8; }

/* Filters */
.filter-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; align-items: center; }
.chip { padding: 0.4rem 0.75rem; border-radius: 999px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.06); color: #cbd5e1; font-size: 0.8125rem; cursor: pointer; transition: all 0.15s; }
.chip:hover { background: rgba(255, 255, 255, 0.08); }
.chip.active { background: rgba(245, 185, 66, 0.18); border-color: rgba(245, 185, 66, 0.4); color: #f5b942; }

/* Drawing notes */
.notes { background: rgba(255, 255, 255, 0.03); border-left: 2px solid rgba(245, 185, 66, 0.4); padding: 0.75rem 1rem; border-radius: 0 0.5rem 0.5rem 0; margin-top: 1rem; }
.notes-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #f5b942; margin-bottom: 0.5rem; font-weight: 500; }
.notes li { list-style: none; padding: 0.125rem 0; color: #cbd5e1; font-size: 0.875rem; }
.notes ul { list-style: none; padding: 0; }

/* Actions */
.action-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.875rem; border-radius: 0.5rem; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: #e8ecf5; font-size: 0.875rem; cursor: pointer; transition: all 0.15s; }
.action-btn:hover { border-color: rgba(245, 185, 66, 0.6); background: rgba(255, 255, 255, 0.1); }

.search { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.5rem; padding: 0.5rem 0.75rem; color: #e8ecf5; font-size: 0.875rem; outline: none; min-width: 200px; }
.search:focus { border-color: rgba(245, 185, 66, 0.6); }

.empty { text-align: center; padding: 3rem 1rem; color: #94a3b8; }

/* Mobile responsive */
@media (max-width: 640px) {
  .container { padding: 0.75rem 0.75rem 5rem; }
  .brand-text h1 { font-size: 1.25rem; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
  .card-value { font-size: 1.5rem; }
  .table { font-size: 0.8125rem; }
  .table th, .table td { padding: 0.5rem 0.375rem; }
  .tabs { padding: 0.25rem; gap: 0.125rem; }
  .tab-btn { padding: 0.5rem 0.75rem; font-size: 0.8125rem; }
  .tab-btn .sub { display: none; }
  .filter-row { gap: 0.375rem; }
  .chip { padding: 0.375rem 0.625rem; font-size: 0.75rem; }
  .search { min-width: 0; width: 100%; margin-bottom: 0.5rem; }
  /* Make table horizontally scrollable on small screens */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .table { min-width: 600px; }
}
</style>
</head>

r the addition","owner":"Otto (CSA F280 screen)","status":"not_started","targetDate":"","materialsRef":"TBD","notes":"Awaiting FILES COMPLETE \u2014 BEGIN REVIEW. Otto to provide rough capacity and duct sizing.","costLineId":"hvac"},{"id":"t-11","stage":"Drywall","task":"Install drywall, tape, mud, sand (new portion)","owner":"Ry","status":"not_started","targetDate":"","materialsRef":"~53 sheets + mud/tape/bead/screws","notes":"Materials only in cost doc. Labour owner-finish.","costLineId":"dry-board"},{"id":"t-12","stage":"Drywall","task":"Prime and paint drywall (new portion + touch-ups)","owner":"Ry","status":"not_started","targetDate":"","materialsRef":"Paint / primer / supplies ~$300\u2013$600","notes":"Existing main floor already primed.","costLineId":"paint"},{"id":"t-13","stage":"Kitchen","task":"Build and install IKEA kitchen cabinets","owner":"Ry / Kenan","status":"not_started","targetDate":"","materialsRef":"IKEA boxes + hardware","notes":"Boxes + hardware list to be confirmed. Countertop separate."},{"id":"t-14","stage":"Kitchen","task":"Install kitchen countertops","owner":"Ry","status":"not_started","targetDate":"","materialsRef":"Starter allowance $1,500\u2013$3,000","notes":"Countertop material TBD.","costLineId":"kit-counter"},{"id":"t-15","stage":"Flooring","task":"Install flooring throughout the main floor (whole home)","owner":"Ry","status":"not_started","targetDate":"","materialsRef":"~1,800 sq ft @ $2\u2013$3/sq ft materials","notes":"Includes existing + new portion (~494 sq ft).","costLineId":"flr-main"},{"id":"t-16","stage":"Bathrooms","task":"Install bathrooms (primary ensuite, Kenan, powder room)","owner":"Ry","status":"not_started","targetDate":"","materialsRef":"See bath fixture rows in cost doc","notes":"Fixtures + tile materials listed. After drywall and flooring."},{"id":"t-17","stage":"Doors + trim","task":"Install interior doors and trim (new portion)","owner":"Ry","status":"not_started","targetDate":"","materialsRef":"8 interior door slabs + hardware + baseboard/casing","notes":"Doors per A1.04 schedule. Baseboard ~252 LF, casing ~15 openings.","costLineId":"dr-slabs"},{"id":"t-18","stage":"Painting","task":"Final paint and touch-ups throughout the main floor / whole home","owner":"Ry","status":"not_started","targetDate":"","materialsRef":"TBD","notes":""},{"id":"t-19","stage":"Lighting","task":"Install interior lighting fixtures","owner":"Ry","status":"not_started","targetDate":"","materialsRef":"TBD","notes":""},{"id":"t-20","stage":"HVAC final","task":"Final HVAC hookups and commissioning","owner":"Otto","status":"not_started","targetDate":"","materialsRef":"TBD","notes":""},{"id":"t-21","stage":"Plumbing final","task":"Final plumbing fixture hookups","owner":"Ry","status":"not_started","targetDate":"","materialsRef":"TBD","notes":""}]},"STATUS_LABELS":{"not_started":"Not started","in_progress":"In progress","blocked":"Blocked","done":"Done"},"STATUS_ORDER":["not_started","in_progress","blocked","done"],"STATUS_COLORS":{"not_started":{"ring":"ring-steel-400/40","dot":"bg-steel-400","chip":"bg-steel-700/60 text-steel-100 border-steel-500/40"},"in_progress":{"ring":"ring-amber-400/40","dot":"bg-amber-400","chip":"bg-amber-500/20 text-amber-300 border-amber-400/40"},"blocked":{"ring":"ring-rust-400/40","dot":"bg-rust-400","chip":"bg-rust-500/20 text-rust-400 border-rust-400/40"},"done":{"ring":"ring-moss-400/40","dot":"bg-moss-400","chip":"bg-moss-500/20 text-moss-400 border-moss-400/40"}}};

const fmtUSD = (n) => {
  if (n === null || n === undefined) return '—';
  return '$' + Math.round(n).toLocaleString('en-US');
};
const fmtUSDPrecise = (n) => {
  if (n === null || n === undefined) return '—';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};

let currentTab = 'overview';
let filterCategory = 'all';
let filterStatus = 'all';
let searchText = '';
let todoStatus = {};

function init() {
  // Set header
  document.getElementById('project-name').textContent = DATA.SEED_DATA.meta.projectName;
  document.getElementById('project-address').textContent = DATA.SEED_DATA.meta.address;
  document.getElementById('project-subtitle').textContent =
    'A live project dashboard — track remaining material costs against actuals, fly through the to-do list, and keep everyone (Ry, Kenan, Otto) on the same page. Last refreshed ' + DATA.SEED_DATA.meta.lastUpdated + '.';

  // Load todo states from localStorage
  try {
    const saved = localStorage.getItem('princess-todo-state');
    if (saved) todoStatus = JSON.parse(saved);
  } catch (e) {}

  // Tab listeners
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

function computeTotals() {
  const costs = DATA.SEED_DATA.costs;
  let low = 0, high = 0, actual = 0, actualCount = 0;
  costs.forEach(c => {
    if (c.lowTotal !== null && c.lowTotal !== undefined) low += c.lowTotal;
    if (c.highTotal !== null && c.highTotal !== undefined) high += c.highTotal;
    if (c.actualAmount !== null && c.actualAmount !== undefined) {
      actual += c.actualAmount;
      actualCount++;
    }
  });
  return { low, high, actual, actualCount, totalCount: costs.length };
}

function renderOverview() {
  const totals = computeTotals();
  const todos = DATA.SEED_DATA.todos;
  const todoStats = {
    done: 0, in_progress: 0, blocked: 0, not_started: 0
  };
  todos.forEach(t => {
    const s = todoStatus[t.id] || t.status;
    todoStats[s] = (todoStats[s] || 0) + 1;
  });

  let html = '<div class="stats-grid">';
  html += '<div class="card"><div class="card-title">Materials estimate</div><div class="card-value">' + fmtUSD(totals.low) + ' – ' + fmtUSD(totals.high) + '</div><div class="card-sub">Subtotal range across ' + totals.totalCount + ' items</div></div>';
  html += '<div class="card"><div class="card-title">Actual spend</div><div class="card-value">' + fmtUSD(totals.actual) + '</div><div class="card-sub">' + totals.actualCount + ' of ' + totals.totalCount + ' items have actuals</div></div>';
  html += '<div class="card"><div class="card-title">Tasks done</div><div class="card-value">' + todoStats.done + ' / ' + todos.length + '</div><div class="card-sub">' + todoStats.in_progress + ' in progress · ' + todoStats.blocked + ' blocked</div></div>';
  html += '<div class="card"><div class="card-title">Next critical</div><div class="card-value" style="font-size:1rem; line-height:1.3;">' + (todos.find(t => (todoStatus[t.id] || t.status) !== 'done')?.title || 'All clear!') + '</div></div>';
  html += '</div>';

  // Drawing notes
  html += '<div class="notes"><div class="notes-title">Drawing References</div><ul>';
  DATA.SEED_DATA.meta.drawingNotes.forEach(n => { html += '<li>' + n + '</li>'; });
  html += '</ul></div>';

  html += '<div class="card" style="margin-top:1.5rem;"><div class="card-title">' + DATA.SEED_DATA.meta.subtotalNote + '</div></div>';

  // Recent activity
  html += '<h2 style="margin-top:1.5rem;margin-bottom:0.75rem;font-size:1.125rem;font-weight:600;">Recent activity</h2>';
  const recent = DATA.SEED_DATA.costs.filter(c => c.actualDate).sort((a,b) => b.actualDate.localeCompare(a.actualDate)).slice(0,5);
  if (recent.length === 0) {
    html += '<div class="empty">No purchases logged yet.</div>';
  } else {
    recent.forEach(c => {
      html += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;"><div><div class="item-name">' + c.item + '</div><div class="item-scope">' + c.actualVendor + ' · ' + c.actualDate + '</div></div><div class="cost-cell cost-actual" style="font-size:1.125rem;font-weight:600;">' + fmtUSD(c.actualAmount) + '</div></div></div>';
    });
  }

  return html;
}

function renderCosts() {
  const costs = DATA.SEED_DATA.costs;
  const cats = ['all', ...Array.from(new Set(costs.map(c => c.category))).sort()];

  let html = '<div class="filter-row">';
  cats.forEach(cat => {
    const label = cat === 'all' ? 'All' : cat;
    html += '<button class="chip ' + (filterCategory === cat ? 'active' : '') + '" data-cat="' + cat + '">' + label + '</button>';
  });
  html += '</div>';

  let filtered = costs;
  if (filterCategory !== 'all') filtered = filtered.filter(c => c.category === filterCategory);
  if (searchText) {
    const s = searchText.toLowerCase();
    filtered = filtered.filter(c => c.item.toLowerCase().includes(s) || (c.scope || '').toLowerCase().includes(s) || (c.notes || '').toLowerCase().includes(s));
  }

  if (filtered.length === 0) {
    html += '<div class="empty">No items match your filter.</div>';
    return html;
  }

  html += '<div class="card" style="padding:0.5rem;"><div class="table-wrap"><table class="table">';
  html += '<thead><tr><th>Item</th><th>Status</th><th class="cost-cell">Est. unit</th><th class="cost-cell">Est. total</th><th class="cost-cell">Actual</th></tr></thead><tbody>';
  filtered.forEach(c => {
    const statusClass = 'badge-' + (c.status || '').toLowerCase().replace(' ', '_');
    html += '<tr>';
    html += '<td><div class="item-name">' + c.item + '</div><div class="item-scope">' + c.scope + '</div>' + (c.notes ? '<div class="item-notes">' + c.notes + '</div>' : '') + '</td>';
    html += '<td><span class="badge ' + statusClass + '">' + c.status + '</span></td>';
    html += '<td class="cost-cell cost-est">' + (c.lowUnit ? fmtUSDPrecise(c.lowUnit) + '–' + fmtUSDPrecise(c.highUnit) : '—') + '</td>';
    html += '<td class="cost-cell cost-est">' + (c.lowTotal ? fmtUSD(c.lowTotal) + '–' + fmtUSD(c.highTotal) : '—') + '</td>';
    html += '<td class="cost-cell">' + (c.actualAmount ? '<span class="cost-actual">' + fmtUSD(c.actualAmount) + '</span><div class="item-notes">' + (c.actualVendor || '') + '</div>' : '—') + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';

  // Summary
  const totals = computeTotals();
  html += '<div class="stats-grid" style="margin-top:1rem;">';
  html += '<div class="card"><div class="card-title">Low estimate</div><div class="card-value">' + fmtUSD(totals.low) + '</div></div>';
  html += '<div class="card"><div class="card-title">High estimate</div><div class="card-value">' + fmtUSD(totals.high) + '</div></div>';
  html += '<div class="card"><div class="card-title">Total actual</div><div class="card-value">' + fmtUSD(totals.actual) + '</div></div>';
  html += '</div>';

  setTimeout(() => {
    document.querySelectorAll('.chip[data-cat]').forEach(chip => {
      chip.addEventListener('click', () => {
        filterCategory = chip.dataset.cat;
        render();
      });
    });
  }, 0);

  return html;
}

function renderTasks() {
  const todos = DATA.SEED_DATA.todos;
  const statuses = ['all', 'not_started', 'in_progress', 'blocked', 'done'];
  const labels = { all: 'All', ...DATA.STATUS_LABELS };

  let html = '<div class="filter-row">';
  statuses.forEach(s => {
    html += '<button class="chip ' + (filterStatus === s ? 'active' : '') + '" data-status="' + s + '">' + labels[s] + '</button>';
  });
  html += '<input type="search" class="search" placeholder="Search tasks…" id="todo-search">';
  html += '</div>';

  let filtered = todos;
  if (filterStatus !== 'all') filtered = filtered.filter(t => (todoStatus[t.id] || t.status) === filterStatus);
  if (searchText) {
    const s = searchText.toLowerCase();
    filtered = filtered.filter(t => t.title.toLowerCase().includes(s) || (t.notes || '').toLowerCase().includes(s) || (t.who || '').toLowerCase().includes(s));
  }

  if (filtered.length === 0) {
    html += '<div class="empty">No tasks match.</div>';
  } else {
    filtered.forEach(t => {
      const status = todoStatus[t.id] || t.status;
      const statusLabel = DATA.STATUS_LABELS[status] || status;
      const isDone = status === 'done';
      html += '<div class="todo-card">';
      html += '<button class="todo-check ' + (isDone ? 'done' : '') + '" data-todo-id="' + t.id + '" aria-label="Toggle">' + (isDone ? '✓' : '') + '</button>';
      html += '<div class="todo-body"><div class="todo-title ' + (isDone ? 'done' : '') + '">' + t.title + '</div>';
      html += '<div class="todo-meta">';
      html += '<span class="badge badge-' + status + '">' + statusLabel + '</span>';
      if (t.who) html += '<span class="owner">' + t.who + '</span>';
      if (t.dueDate) html += '<span>📅 ' + t.dueDate + '</span>';
      if (t.cost && t.cost > 0) html += '<span>' + fmtUSD(t.cost) + '</span>';
      html += '</div>';
      if (t.notes) html += '<div class="item-notes" style="margin-top:0.375rem;">' + t.notes + '</div>';
      html += '</div></div>';
    });
  }

  setTimeout(() => {
    document.querySelectorAll('.chip[data-status]').forEach(chip => {
      chip.addEventListener('click', () => { filterStatus = chip.dataset.status; render(); });
    });
    const searchInput = document.getElementById('todo-search');
    if (searchInput) {
      searchInput.value = searchText;
      searchInput.addEventListener('input', (e) => { searchText = e.target.value; render(); });
    }
    document.querySelectorAll('.todo-check[data-todo-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.todoId;
        const current = todoStatus[id] || DATA.SEED_DATA.todos.find(t => t.id === id).status;
        const next = current === 'done' ? 'not_started' : 'done';
        todoStatus[id] = next;
        try { localStorage.setItem('princess-todo-state', JSON.stringify(todoStatus)); } catch (e) {}
        render();
      });
    });
  }, 0);

  return html;
}

function render() {
  let html = '';
  if (currentTab === 'overview') html = renderOverview();
  else if (currentTab === 'costs') html = renderCosts();
  else if (currentTab === 'tasks') html = renderTasks();
  document.getElementById('content').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
